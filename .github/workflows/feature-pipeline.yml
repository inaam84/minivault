name: Feature Branch Pipeline

on:
  push:
    branches:
      - 'feature/**'
      - 'fix/**'
      - 'chore/**'
      - 'hotfix/**'

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Code Quality & Formatting
  # ─────────────────────────────────────────
  code-quality:
    name: Code Quality (Spotless)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make Gradle wrapper executable
        working-directory: backend
        run: chmod +x gradlew

      - name: Run Spotless format check
        working-directory: backend
        run: ./gradlew spotlessCheck
        # If this fails, the dev needs to run: ./gradlew spotlessApply locally

  # ─────────────────────────────────────────
  # JOB 2: Build & Test Backend
  # ─────────────────────────────────────────
  backend-build-test:
    name: Backend Build & Tests
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make Gradle wrapper executable
        working-directory: backend
        run: chmod +x gradlew

      - name: Build backend (compile only, skip tests for now)
        working-directory: backend
        run: ./gradlew classes

      - name: Run unit tests
        working-directory: backend
        run: ./gradlew test
        env:
          SPRING_PROFILES_ACTIVE: test
          # Tests use H2 in-memory DB, no real DB needed

      - name: Upload test reports
        if: always() # Upload even if tests fail so you can inspect
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: backend/build/reports/tests/test/
          retention-days: 7

      - name: Upload test results (JUnit XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/build/test-results/test/
          retention-days: 7

  # ─────────────────────────────────────────
  # JOB 3: Docker Compose Build Check
  # ─────────────────────────────────────────
  docker-build-check:
    name: Docker Compose Build Check
    runs-on: ubuntu-latest
    needs: backend-build-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env file for CI
        run: |
          cat <<EOF > .env
          DB_HOST=db
          DB_PORT=3306
          DB_NAME=minivault
          DB_USER=minivault_user
          DB_PASSWORD=minivault_pass
          JWT_SECRET=ci-secret-key-not-for-production
          SPRING_PROFILES_ACTIVE=dev
          EOF

      - name: Build Docker images (no start)
        run: docker compose build
        # Verifies all Dockerfiles build successfully without running containers

  # ─────────────────────────────────────────
  # JOB 4: Summary
  # ─────────────────────────────────────────
  pipeline-summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [code-quality, backend-build-test, docker-build-check]
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          echo "code-quality:       ${{ needs.code-quality.result }}"
          echo "backend-build-test: ${{ needs.backend-build-test.result }}"
          echo "docker-build-check: ${{ needs.docker-build-check.result }}"

          if [[ "${{ needs.code-quality.result }}"       != "success" ]] ||
             [[ "${{ needs.backend-build-test.result }}" != "success" ]] ||
             [[ "${{ needs.docker-build-check.result }}" != "success" ]]; then
            echo "❌ One or more pipeline jobs failed."
            exit 1
          fi

          echo "✅ All feature pipeline checks passed!"
