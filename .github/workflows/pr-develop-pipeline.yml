name: Pull Request → Develop Pipeline

on:
  pull_request:
    branches:
      - develop
    types: [opened, synchronize, reopened]

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Code Quality & Formatting
  # ─────────────────────────────────────────
  code-quality:
    name: Code Quality (Spotless)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make Gradle wrapper executable
        working-directory: backend
        run: chmod +x gradlew

      - name: Run Spotless format check
        working-directory: backend
        run: ./gradlew spotlessCheck

  # ─────────────────────────────────────────
  # JOB 2: Full Backend Build & Tests
  # ─────────────────────────────────────────
  backend-full-test:
    name: Full Backend Build & Tests
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make Gradle wrapper executable
        working-directory: backend
        run: chmod +x gradlew

      - name: Run full Gradle build + tests
        working-directory: backend
        run: ./gradlew build
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-test-report
          path: backend/build/reports/tests/test/
          retention-days: 14

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/build/libs/*.jar
          retention-days: 3

  # ─────────────────────────────────────────
  # JOB 3: Integration Test with Docker Compose
  # (Spins up the full stack and runs tests against it)
  # ─────────────────────────────────────────
  integration-test:
    name: Integration Test (Full Stack)
    runs-on: ubuntu-latest
    needs: backend-full-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env file for CI
        run: |
          cat <<EOF > .env
          DB_HOST=db
          DB_PORT=3306
          DB_NAME=minivault
          DB_USER=minivault_user
          DB_PASSWORD=minivault_pass
          JWT_SECRET=ci-integration-secret-key
          SPRING_PROFILES_ACTIVE=dev
          EOF

      - name: Start full stack
        run: docker compose up --build -d
        # -d = detached (runs in background)

      - name: Wait for backend to be healthy
        run: |
          echo "Waiting for backend to be ready..."
          for i in {1..30}; do
            if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "✅ Backend is up!"
              break
            fi
            echo "Attempt $i/10 - waiting..."
            sleep 5
          done
          # Final check - fail if still not up
          curl -sf http://localhost:8080/actuator/health || (echo "❌ Backend never became healthy" && exit 1)
        # Note: add spring-boot-starter-actuator to build.gradle for /actuator/health
        # Or replace with your own health check endpoint

      - name: Run integration/smoke tests
        run: |
          echo "Running smoke tests against live stack..."
          # Example: hit a public endpoint and assert 200
          curl -sf http://localhost:8080/actuator/health | grep -q '"status":"UP"'
          echo "✅ Smoke test passed"
          # TODO: Replace/expand with your actual integration test commands
          # e.g. ./gradlew integrationTest or newman run postman_collection.json

      - name: Print container logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down stack
        if: always()
        run: docker compose down -v
        # -v removes volumes too (clean state)

  # ─────────────────────────────────────────
  # JOB 4: Security Scan
  # ─────────────────────────────────────────
  security-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make Gradle wrapper executable
        working-directory: backend
        run: chmod +x gradlew

      - name: Run OWASP Dependency Check
        working-directory: backend
        run: ./gradlew dependencyCheckAnalyze --info
        continue-on-error: true
        # continue-on-error so it doesn't block PRs initially
        # Remove once you've reviewed and resolved initial findings

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: backend/build/reports/dependency-check-report.html
          retention-days: 14

  # ─────────────────────────────────────────
  # JOB 5: Summary
  # ─────────────────────────────────────────
  pipeline-summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [code-quality, backend-full-test, integration-test, security-scan]
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          echo "code-quality:      ${{ needs.code-quality.result }}"
          echo "backend-full-test: ${{ needs.backend-full-test.result }}"
          echo "integration-test:  ${{ needs.integration-test.result }}"
          echo "security-scan:     ${{ needs.security-scan.result }}"

          if [[ "${{ needs.code-quality.result }}"      != "success" ]] ||
             [[ "${{ needs.backend-full-test.result }}" != "success" ]] ||
             [[ "${{ needs.integration-test.result }}"  != "success" ]]; then
            echo "❌ One or more required pipeline jobs failed."
            exit 1
          fi

          echo "✅ All PR pipeline checks passed! Ready for review."
