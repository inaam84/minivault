version: "3.9"

services:
  # ------------------------
  # MySQL Database
  # ------------------------
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: minivault
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$$MYSQL_USER -p$$MYSQL_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ------------------------
  # Backend (Spring Boot)
  # ------------------------
  backend:
    build:
      context: ./backend
      target: dev  # We will add this stage to your Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: minivault
      DB_USERNAME: app
      DB_PASSWORD: app
      ENCRYPTION_KEY: "MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE="
      SPRING_PROFILES_ACTIVE: dev
      JAVA_OPTS: "-Djava.security.egd=file:/dev/urandom"
    volumes:
      - ./backend:/home/gradle/project          # Mount the whole project
      - gradle_cache:/home/gradle/.gradle        # Cache dependencies locally so it stays fast
    # This keeps Gradle alive and watching for file changes, and runs the Spring Boot app
    command: >
      ./gradlew bootRun --continuous --no-daemon
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:8080"

  # ------------------------
  # Frontend (React/Vite)
  # ------------------------
  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3000:5173"
    volumes:
      - ./frontend:/app          # mount local code
      - /app/node_modules        # avoid overwriting container node_modules
    environment:
    - CHOKIDAR_USEPOLLING=true

volumes:
  db_data:
  gradle_cache: