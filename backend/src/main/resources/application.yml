server:
  port: ${PORT:8080}
spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:minivault}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:app}
    password: ${DB_PASSWORD:app}
  jpa:
    hibernate:
      ddl-auto: create
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
    show-sql: true
  sql:
    init:
      mode: always
      separator: ";\n"
  mail:
    host: sandbox.smtp.mailtrap.io
    port: 2525
    username: 54c184d13de458
    password: c1326f1a390407
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# Encryption configuration
encryption:
  # Use the dev key as default; override with ENCRYPTION_KEY env var in prod
  key: ${ENCRYPTION_KEY:MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE=}

otp:
  cleanup:
    cron: "0 0 * * * *"